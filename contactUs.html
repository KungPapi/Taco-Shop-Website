<body>
    <h2>Our Contact Form</h2>

    <h4>Send us a message</h4>
    <form>
        <label for="firstName">Name:</label>
        <input type="text" name="firstName"
          id="firstName" placeholder="Jane"
          autocomplete="on" required autofocus autocapitalize="name">
        
        <br>
        <label for="email">Email:</label>
        <input type="email" name="email"
        autocomplete="on" placeholder="Email" required autofocus>

        <br>
        <br><label title="Your message:" for="message">Your message:</label>
        <br><textarea placeholder="Type your message here" required autofocus style="height: 200px; width: 300px;"></textarea>
        
        <br><button type="submit">Submit</button>    
    </form>

    <hr>

    <h2>Our Location</h2>
    <address>555 Taco Temptation Ln, Suite
        <br>Kansas City, MO 555-555
    </address>
